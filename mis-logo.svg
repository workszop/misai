<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1e1408"/>
    </radialGradient>
    <radialGradient id="earInnerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0736a"/>
      <stop offset="100%" stop-color="#8b4a42"/>
    </radialGradient>
    <radialGradient id="noseGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="100%" stop-color="#0d0808"/>
    </radialGradient>
    <radialGradient id="eyeShineL" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeShineR" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#e84545" flood-opacity="0.25"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="192" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Red accent ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#e84545" stroke-width="2.5" opacity="0.6"/>
  <!-- Gold accent ring (inner) -->
  <circle cx="200" cy="200" r="184" fill="none" stroke="#d4a853" stroke-width="0.8" opacity="0.25"/>

  <!-- LEFT EAR (outer) -->
  <circle cx="114" cy="118" r="46" fill="url(#faceGrad)"/>
  <!-- Left ear inner -->
  <circle cx="114" cy="120" r="26" fill="url(#earInnerGrad)" opacity="0.85"/>

  <!-- RIGHT EAR (outer) -->
  <circle cx="286" cy="118" r="46" fill="url(#faceGrad)"/>
  <!-- Right ear inner -->
  <circle cx="286" cy="120" r="26" fill="url(#earInnerGrad)" opacity="0.85"/>

  <!-- FACE (main circle) -->
  <circle cx="200" cy="215" r="145" fill="url(#faceGrad)"/>

  <!-- Muzzle area -->
  <ellipse cx="200" cy="285" rx="62" ry="48" fill="#2e1e10" opacity="0.6"/>

  <!-- LEFT EYE -->
  <circle cx="160" cy="200" r="22" fill="#0a0806"/>
  <circle cx="160" cy="200" r="18" fill="#1a1208"/>
  <!-- Eye shine -->
  <circle cx="152" cy="193" r="7" fill="url(#eyeShineL)"/>
  <!-- Subtle red iris rim -->
  <circle cx="160" cy="200" r="18" fill="none" stroke="#e84545" stroke-width="1.5" opacity="0.4"/>

  <!-- RIGHT EYE -->
  <circle cx="240" cy="200" r="22" fill="#0a0806"/>
  <circle cx="240" cy="200" r="18" fill="#1a1208"/>
  <circle cx="232" cy="193" r="7" fill="url(#eyeShineR)"/>
  <circle cx="240" cy="200" r="18" fill="none" stroke="#e84545" stroke-width="1.5" opacity="0.4"/>

  <!-- NOSE -->
  <ellipse cx="200" cy="265" rx="28" ry="20" fill="url(#noseGrad)"/>
  <ellipse cx="200" cy="265" rx="28" ry="20" fill="none" stroke="#e84545" stroke-width="1" opacity="0.3"/>
  <!-- Nose highlight -->
  <ellipse cx="193" cy="260" rx="9" ry="6" fill="#ffffff" opacity="0.07"/>

  <!-- Mouth lines -->
  <path d="M200 284 Q184 298 176 296" fill="none" stroke="#0d0808" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M200 284 Q216 298 224 296" fill="none" stroke="#0d0808" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Gold dot accent between eyes (forehead mark) -->
  <circle cx="200" cy="164" r="5" fill="#d4a853" opacity="0.5"/>

  <!-- Subtle brow ridges -->
  <path d="M142 183 Q160 175 178 181" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M222 181 Q240 175 258 183" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
